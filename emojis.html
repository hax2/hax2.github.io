<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish Emoji Game 🇪🇸</title>

    <style>
        /* --- General Styling --- */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f7f2;
            color: #333;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        #game-container {
            width: 90%;
            max-width: 600px;
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            color: #2a7f40;
        }
        
        h2 {
            text-transform: none; /* Allow sentences to be cased normally */
        }

        .screen {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .hidden {
            display: none;
        }

        .btn {
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            transition: background-color 0.3s, transform 0.2s;
        }

        .btn:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        /* --- Game Area Specifics --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-weight: bold;
            color: #555;
            padding-bottom: 1rem;
            border-bottom: 2px solid #eee;
        }

        .prompt-content {
             min-height: 100px;
             display: flex;
             flex-direction: column;
             justify-content: center;
             align-items: center;
             gap: 0.5rem;
        }
        
        /* --- EMOJI Styling --- */
        #emoji-prompt-2, #emoji-prompt-3 {
            font-size: 7rem; /* Large emoji for Levels 2 & 3 */
            line-height: 1;
        }
        
        #sentence-prompt-3 {
            font-size: 1.8rem;
            font-weight: 500;
            color: #444;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 1rem;
            width: 100%;
        }

        .emoji-option {
            font-size: 4rem; /* Big emojis for clicking in Level 1 */
            padding: 10px;
            background-color: #f9f9f9;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .emoji-option:hover {
            transform: scale(1.1);
            border-color: #4CAF50;
        }
        
        /* --- Correct/Incorrect Highlights --- */
        .correct-highlight {
            border-color: #4CAF50 !important;
            background-color: #e8f5e9 !important;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .incorrect-highlight {
            border-color: #d9534f !important;
            background-color: #ffebee !important;
        }
        
        /* --- Prompts & Options by Level --- */
        #level-1-prompt-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        #word-prompt {
            font-size: 2.2rem;
            margin: 0;
            color: #d9534f;
        }

        #speak-button {
            font-size: 2rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            margin: 0 auto;
        }

        .name-option-btn {
            padding: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            border: 2px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
            transition: background-color 0.3s, border-color 0.3s;
            text-transform: none; /* Allow sentences */
        }

        .name-option-btn:hover {
            background-color: #e9e9e9;
            border-color: #ccc;
        }

        #text-input-area {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #text-answer {
            padding: 10px;
            font-size: 1.2rem;
            border: 2px solid #ccc;
            border-radius: 8px;
            width: 250px;
        }

        .feedback {
            min-height: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 1rem;
        }

        .correct {
            color: #5cb85c;
        }

        .incorrect {
            color: #d9534f;
        }

    </style>
</head>

            <div class="prompt-content">

            <div id="text-input-area">

            </div>
            <div id="feedback-3" class="feedback"></div>

    </div>

            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            function levenshteinDistance(a, b) {
                if (a.length === 0) return b.length;
                if (b.length === 0) return a.length;
                const matrix = [];
                for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
                for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
                for (let i = 1; i <= b.length; i++) {
                    for (let j = 1; j <= a.length; j++) {
                        if (b.charAt(i - 1) === a.charAt(j - 1)) {
                            matrix[i][j] = matrix[i - 1][j - 1];
                        } else {
                            matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                        }
                    }
                }
                return matrix[b.length][a.length];
            }

                };
            }

            function speak(text) {
                if (!window.speechSynthesis) return;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = currentLang === 'es' ? 'es-ES' : 'sv-SE';
                utterance.rate = 0.9;
                const voicePrefix = currentLang === 'es' ? 'es' : 'sv';
                const voice = window.speechSynthesis.getVoices().find(v => v.lang.startsWith(voicePrefix));
                if (voice) utterance.voice = voice;
                window.speechSynthesis.speak(utterance);
            }

            function getItemParts(item) {
                if (currentLang === 'es') {
                    const parts = item.spanish.split(' ');
                    const definite_article = parts[0];
                    const noun = parts.slice(1).join(' ');
                    let indefinite_article = '';
                    
                    switch (definite_article) {
                        case 'el': indefinite_article = 'un'; break;
                        case 'la': indefinite_article = 'una'; break;
                        case 'los': indefinite_article = 'unos'; break;
                        case 'las': indefinite_article = 'unas'; break;
                    }
                    return { full: item.spanish, noun, definite_article, indefinite_article };
                } else {
                    const [def, indef_art, noun] = item.swedish.split('|');
                    return { full: def, noun, definite_article: '', indefinite_article: indef_art };
                }
            }

                let template = templates[Math.floor(Math.random() * templates.length)];
                return template

                    .replace('{noun}', itemParts.noun)
                    .replace('{definite_article}', itemParts.definite_article)
                    .replace('{indefinite_article}', itemParts.indefinite_article)
                    .replace('  ', ' ') // clean up double spaces if article is empty

                const pText = currentLang === 'es' ? 'Puntos' : 'Poäng';
                statusBar.innerHTML = `<span>${qText}: ${currentQuestionIndex + 1} / ${gameData.length}</span><span>${pText}: ${score}</span>`;
            }

            function loadQuestion() {
                if (currentQuestionIndex >= gameData.length) {
                    showScreen('end');
                    finalScoreDisplay.textContent = currentLang === 'es' 
                        ? `Tu puntuación final es ${score} de ${gameData.length}.` 
                        : `Din slutpoäng är ${score} av ${gameData.length}.`;
                    return;
                }
                
                // Clear feedback from previous question
                [feedback1, feedback2, feedback3].forEach(f => f.textContent = '');
                
                const currentItem = gameData[currentQuestionIndex];
                updateStatus(currentLevel);
                
                switch (currentLevel) {
                    case 1: setupLevel1(currentItem); break;
                    case 2: setupLevel2(currentItem); break;
                    case 3: setupLevel3(currentItem); break;
                }
            }

            // --- LEVEL SETUPS ---

            function setupLevel1(item) {
                const itemParts = getItemParts(item);
                const templates = currentLang === 'es' ? L1_L2_TEMPLATES_ES : L1_L2_TEMPLATES_SV;
                const sentence = createSentence(itemParts, templates);
                const itemKey = currentLang === 'es' ? item.spanish : item.swedish;
                
                wordPrompt.textContent = sentence;
                speak(sentence);
                speakButton.onclick = () => speak(sentence);

                emojiOptions.innerHTML = '';
                const distractors = EMOJI_DATA.filter(d => d.emoji !== item.emoji).sort(() => 0.5 - Math.random()).slice(0, 5);
                const options = shuffleArray([item, ...distractors]);
                
                options.forEach(opt => {
                    const optKey = currentLang === 'es' ? opt.spanish : opt.swedish;
                    const emojiDiv = document.createElement('div');
                    emojiDiv.textContent = opt.emoji;
                    emojiDiv.className = 'emoji-option';
                    emojiDiv.dataset.key = optKey;
                    emojiDiv.onclick = (e) => {
                        const clickedElement = e.target;
                        const isCorrect = clickedElement.dataset.key === itemKey;
                        checkAnswer(isCorrect, 1, null, clickedElement, itemKey);
                    };
                    emojiOptions.appendChild(emojiDiv);
                });
            }

            function setupLevel2(item) {
                emojiPrompt2.textContent = item.emoji;
                nameOptions.innerHTML = '';
                const itemKey = currentLang === 'es' ? item.spanish : item.swedish;
                
                const distractors = EMOJI_DATA.filter(d => (currentLang === 'es' ? d.spanish : d.swedish) !== itemKey).sort(() => 0.5 - Math.random()).slice(0, 3);
                const optionsData = shuffleArray([item, ...distractors]);
                const templates = currentLang === 'es' ? L1_L2_TEMPLATES_ES : L1_L2_TEMPLATES_SV;
                
                optionsData.forEach(opt => {
                    const optParts = getItemParts(opt);
                    const sentence = createSentence(optParts, templates);
                    const optKey = currentLang === 'es' ? opt.spanish : opt.swedish;
                    
                    const button = document.createElement('button');
                    button.textContent = sentence;
                    button.classList.add('name-option-btn');
                    button.dataset.key = optKey;
                    button.onclick = (e) => {
                        const clickedElement = e.target;
                        const isCorrect = clickedElement.dataset.key === itemKey;
                        checkAnswer(isCorrect, 2, null, clickedElement, itemKey);
                    };
                    nameOptions.appendChild(button);
                });
            }

            function setupLevel3(item) {
                const itemParts = getItemParts(item);
                const templates = currentLang === 'es' ? L3_TEMPLATES_ES : L3_TEMPLATES_SV;
                const sentenceTemplate = createSentence(itemParts, templates);

                emojiPrompt3.textContent = item.emoji;
                sentencePrompt3.textContent = sentenceTemplate;
                textAnswerInput.value = '';
                textAnswerInput.disabled = false;
                submitAnswerButton.disabled = false;
                textAnswerInput.classList.remove('correct-highlight', 'incorrect-highlight');
                textAnswerInput.focus();

                const checkSpelling = () => {
                    const userAnswer = textAnswerInput.value.trim().toLowerCase();
                    if (!userAnswer) return;
                    
                    const correctAnswer = itemParts.noun.toLowerCase();
                    const distance = levenshteinDistance(userAnswer, correctAnswer);
                    const isCorrect = distance <= 1 || userAnswer === correctAnswer;
                    checkAnswer(isCorrect, 3, itemParts.noun, textAnswerInput);
                };

                submitAnswerButton.onclick = checkSpelling;
                textAnswerInput.onkeydown = (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        checkSpelling();
                    }
                };
            }

            // --- ANSWER CHECKING & PROGRESSION ---

            function checkAnswer(isCorrect, level, fullCorrectAnswer, clickedElement, correctKey) {
                const feedbackEl = document.getElementById(`feedback-${level}`);
                const currentItem = gameData[currentQuestionIndex];
                let defaultAnswer;
                if (currentLang === 'es') {
                    defaultAnswer = currentItem.spanish;
                } else {
                    defaultAnswer = currentItem.swedish.split('|')[0];
                }
                const answerToShow = fullCorrectAnswer || defaultAnswer;
                
                if (isCorrect) {
                    score++;
                    feedbackEl.textContent = currentLang === 'es' ? `¡Correcto! 👍 (${answerToShow})` : `Rätt! 👍 (${answerToShow})`;
                    feedbackEl.className = 'feedback correct';
                    if (clickedElement) clickedElement.classList.add('correct-highlight');
                } else {
                    feedbackEl.textContent = currentLang === 'es' ? `Incorrecto. La respuesta es: ${answerToShow}` : `Fel. Svaret är: ${answerToShow}`;
                    feedbackEl.className = 'feedback incorrect';
                    if (clickedElement) clickedElement.classList.add('incorrect-highlight');
                    
                    // Highlight the actual correct element
                    if (level === 1) {
                        const correctEl = Array.from(document.querySelectorAll('#emoji-options .emoji-option')).find(el => el.dataset.key === correctKey);
                        if (correctEl) correctEl.classList.add('correct-highlight');
                    } else if (level === 2) {
                        const correctEl = Array.from(document.querySelectorAll('#name-options .name-option-btn')).find(el => el.dataset.key === correctKey);
                        if (correctEl) correctEl.classList.add('correct-highlight');
                    }

                    // Spaced Repetition: Re-insert the missed word 2 questions later (3rd from current index)
                    const reinsertIndex = currentQuestionIndex + 3;
                    if (reinsertIndex < gameData.length) {
                        gameData.splice(reinsertIndex, 0, currentItem);
                    } else {
                        gameData.push(currentItem);
                    }
                }
                
                updateStatus(level);
                disableInputsForFeedback(level);

                setTimeout(() => {
                    currentQuestionIndex++;
                    loadQuestion();
                }, isCorrect ? 500 : 2500);
            }
            
            function disableInputsForFeedback(level) {
                 if (level === 1) {
                    document.querySelectorAll('#emoji-options .emoji-option').forEach(el => el.style.pointerEvents = 'none');
                } else if (level === 2) {
                    document.querySelectorAll('#name-options button').forEach(btn => btn.disabled = true);
                } else if (level === 3) {
                    submitAnswerButton.disabled = true;
                    textAnswerInput.disabled = true;
                }
            }

            // --- EVENT LISTENERS ---
            langToggleBtn.addEventListener('click', () => {
                if (currentLang === 'es') {
                    currentLang = 'sv';
                    langToggleBtn.textContent = '🇪🇸 Switch to Spanish';
                    document.title = 'Swedish Emoji Game 🇸🇪';
                    gameTitle.textContent = 'Svenska Frasspelet 🇸🇪';
                    gameSubtitle.textContent = 'Learn Swedish by forming sentences with emojis!';
                    document.querySelector('#level-select-screen h2').textContent = 'Välj nivå';
                    document.getElementById('level-1-select').textContent = 'Nivå 1';
                    document.getElementById('level-2-select').textContent = 'Nivå 2';
                    document.getElementById('level-3-select').textContent = 'Nivå 3';
                    document.getElementById('back-to-start').textContent = 'Tillbaka till start';
                    document.getElementById('start-button').textContent = 'Börja Spela 🚀';
                    document.querySelectorAll('#change-level-1, #change-level-2, #change-level-3, #end-change-level').forEach(btn => btn.textContent = 'Byt nivå');
                    document.getElementById('text-answer').placeholder = 'Skriv ordet som saknas...';
                    document.querySelector('#end-screen h1').textContent = 'Spelet är slut! 🎉';
                    document.getElementById('play-again-button').textContent = 'Spela igen';
                    document.getElementById('submit-answer').textContent = 'Rätta';
                } else {
                    currentLang = 'es';
                    langToggleBtn.textContent = '🇸🇪 Switch to Swedish';
                    document.title = 'Spanish Emoji Game 🇪🇸';
                    gameTitle.textContent = 'Juego de Frases en Español 🇪🇸';
                    gameSubtitle.textContent = 'Learn Spanish by forming sentences with emojis!';
                    document.querySelector('#level-select-screen h2').textContent = 'Selecciona el nivel';
                    document.getElementById('level-1-select').textContent = 'Nivel 1';
                    document.getElementById('level-2-select').textContent = 'Nivel 2';
                    document.getElementById('level-3-select').textContent = 'Nivel 3';
                    document.getElementById('back-to-start').textContent = 'Volver al inicio';
                    document.getElementById('start-button').textContent = 'Start Game 🚀';
                    document.querySelectorAll('#change-level-1, #change-level-2, #change-level-3, #end-change-level').forEach(btn => btn.textContent = 'Cambiar nivel');
                    document.getElementById('text-answer').placeholder = 'Escribe la palabra que falta...';
                    document.querySelector('#end-screen h1').textContent = '¡Juego Terminado! 🎉';
                    document.getElementById('play-again-button').textContent = 'Play Again';
                    document.getElementById('submit-answer').textContent = 'Check';
                }
            });

            startButton.addEventListener('click', () => showScreen('level-select'));
            backToStart.addEventListener('click', () => showScreen('start'));
            
            level1Select.addEventListener('click', () => startGame(1));
            level2Select.addEventListener('click', () => startGame(2));
            level3Select.addEventListener('click', () => startGame(3));
            
            playAgainButton.addEventListener('click', () => startGame(currentLevel));

            changeLevelButtons.forEach(button => {
                button.addEventListener('click', () => showScreen('level-select'));
            });
        });
    </script>
</body>
</html>
