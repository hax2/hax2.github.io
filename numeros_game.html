<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Constructor de Números - Cuenta Conmigo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b;
            --primary-glow: rgba(245, 158, 11, 0.25);
            --success: #10b981;
            --bg: #0f172a;
            --card: #1e293b;
            --card-border: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 1.5rem; animation: fadeIn 0.6s ease-out; }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }
        .header p { color: var(--muted); font-size: 1rem; }
        
        .how-to-play {
            background: rgba(245, 158, 11, 0.08);
            border: 1px dashed var(--primary);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: var(--muted);
            text-align: center;
            max-width: 600px;
        }

        #game-layout {
            display: flex;
            gap: 1.5rem;
            max-width: 1100px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .main-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.8rem;
            flex: 1;
            min-width: 340px;
            max-width: 750px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            position: relative;
        }

        /* Tabs */
        .level-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }
        .level-tab {
            background: #0f172a;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .level-tab:hover { background: #334155; color: white; }
        .level-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
        }

        /* Instruction */
        #instruction-box {
            width: 100%;
            background: #0f172a;
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.2rem;
            text-align: center;
            box-shadow: 0 0 20px var(--primary-glow);
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .instruction-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }
        .instruction-text {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.3;
        }
        .instruction-text strong { color: var(--accent); }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-top: 20px;
            margin-bottom: 20px;
            max-width: 500px;
        }
        .option-btn {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 16px;
            color: #e2e8f0;
            font-size: 1.6rem;
            font-weight: 700;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Outfit', sans-serif;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .option-btn:hover:not(:disabled) {
            background: #334155;
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(245, 158, 11, 0.15);
        }
        .option-btn:active:not(:disabled) {
            transform: translateY(0);
        }
        .option-btn.correct {
            background: #10b981;
            border-color: #10b981;
            color: white;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
        .option-btn.incorrect {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }
        .option-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Sidebar */
        .sidebar { width: 260px; display: flex; flex-direction: column; gap: 1.2rem; }
        .side-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.2rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .side-card h3 { color: var(--primary); font-size: 1.1rem; margin-bottom: 0.8rem; }
        .stat-row { display: flex; justify-content: space-between; padding: 0.4rem 0; }
        .stat-label { color: var(--muted); }
        .stat-value { font-weight: 700; color: var(--accent); }
        .vocab-list { list-style: none; }
        .vocab-item {
            display: flex; justify-content: space-between; padding: 0.5rem 0;
            border-bottom: 1px solid #1e293b; font-size: 0.95rem;
        }
        .vocab-item:last-child { border-bottom: none; }
        .vocab-word { font-weight: 600; color: var(--text); }
        .vocab-trans { color: var(--muted); font-size: 0.85rem; }

        /* TTS */
        #tts-toggle {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 50%; width: 50px; height: 50px;
            font-size: 1.4rem; cursor: pointer; color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; z-index: 50;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #tts-toggle:hover { transform: scale(1.1); }
        #tts-toggle.off { color: var(--muted); }

        /* Feedback Overlay */
        #feedback {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 3.5rem; font-weight: 800; pointer-events: none; opacity: 0;
            z-index: 20; text-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        #feedback.show { animation: feedbackAnim 1.5s ease-out forwards; }
        
        @keyframes feedbackAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            85% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
        }
        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 750px) {
            #game-layout { flex-direction: column; align-items: center; }
            .sidebar { width: 100%; max-width: 500px; }
            .main-card { min-width: 0; width: 100%; padding: 1rem; }
            .stage-container { flex-wrap: wrap; }
            .zone-wrapper { min-width: 45%; }
            .coin-buttons { gap: 10px; padding: 10px; }
            .instruction-text { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Cuenta Conmigo</h1>
        <p>Aprende cómo se forman los números en español</p>
    </div>

    <div class="how-to-play">
        <strong>Cómo jugar:</strong> Lee el número en español y selecciona la opción numérica correcta de la lista.
    </div>

    <div id="game-layout">
        <div class="main-card">
            <div class="level-tabs">
                <button class="level-tab active" data-level="1">1 - 10</button>
                <button class="level-tab" data-level="2">10 - 100</button>
                <button class="level-tab" data-level="3">100 - 1000</button>
                <button class="level-tab" data-level="4">Fechas (1000+)</button>
            </div>

            <div id="instruction-box">
                <div class="instruction-label">Tu misión: Construye el número</div>
                <div id="instruction" class="instruction-text">Cargando...</div>
            </div>

            <div id="feedback"></div>

            <div id="options-container" class="options-grid"></div>
        </div>

        <div class="sidebar">
            <div class="side-card">
                <h3>📊 Progreso</h3>
                <div class="stat-row">
                    <span class="stat-label">Ronda</span>
                    <span id="round-val" class="stat-value">1</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Puntos</span>
                    <span id="score-val" class="stat-value">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Racha</span>
                    <span id="streak-val" class="stat-value">0 🔥</span>
                </div>
            </div>

            <div class="side-card">
                <h3>📖 Vocabulario</h3>
                <ul class="vocab-list" id="vocab-list">
                    <!-- Dynamic -->
                </ul>
            </div>
        </div>
    </div>

    <button id="tts-toggle" title="Alternar sonido">🔊</button>

    <script>
        const unities = ['', 'uno', 'dos', 'tres', 'cuatro', 'cinco', 'seis', 'siete', 'ocho', 'nueve', 'diez', 'once', 'doce', 'trece', 'catorce', 'quince', 'dieciséis', 'diecisiete', 'dieciocho', 'diecinueve'];
        const twenties = ['veinte', 'veintiuno', 'veintidós', 'veintitrés', 'veinticuatro', 'veinticinco', 'veintiséis', 'veintisiete', 'veintiocho', 'veintinueve'];
        const tens = ['', '', 'veinte', 'treinta', 'cuarenta', 'cincuenta', 'sesenta', 'setenta', 'ochenta', 'noventa'];
        const hundreds = ['', 'ciento', 'doscientos', 'trescientos', 'cuatrocientos', 'quinientos', 'seiscientos', 'setecientos', 'ochocientos', 'novecientos'];

        function numberToSpanish(n) {
            if (n === 0) return 'cero';
            if (n < 20) return unities[n];
            if (n < 30) return twenties[n - 20];
            if (n < 100) {
                let t = tens[Math.floor(n / 10)];
                let u = n % 10;
                return t + (u > 0 ? ' y ' + unities[u] : '');
            }
            if (n === 100) return 'cien';
            if (n < 1000) {
                let h = hundreds[Math.floor(n / 100)];
                let rest = n % 100;
                return h + (rest > 0 ? ' ' + numberToSpanish(rest) : '');
            }
            if (n < 4000) {
                let th = Math.floor(n / 1000);
                let rest = n % 1000;
                let thStr = th === 1 ? 'mil' : unities[th] + ' mil';
                return thStr + (rest > 0 ? ' ' + numberToSpanish(rest) : '');
            }
            return n.toString();
        }

        let currentLevel = 1;
        let targetNumber = 0;
        let round = 1;
        let score = 0;
        let streak = 0;
        let locked = false;
        let ttsEnabled = true;

        function speak(text) {
            if (!ttsEnabled) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'es-ES';
            window.speechSynthesis.speak(u);
        }

        document.getElementById('tts-toggle').addEventListener('click', function() {
            ttsEnabled = !ttsEnabled;
            this.textContent = ttsEnabled ? '🔊' : '🔇';
            this.classList.toggle('off', !ttsEnabled);
            if (ttsEnabled && targetNumber > 0) speak(numberToSpanish(targetNumber));
        });

        document.querySelectorAll('.level-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                if (locked) return; 
                document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentLevel = parseInt(e.target.getAttribute('data-level'));
                round = 1;
                document.getElementById('round-val').textContent = round;
                updateVocabulary();
                generateTask();
            });
        });

        function updateVocabulary() {
            const list = document.getElementById('vocab-list');
            list.innerHTML = '';
            let items = [];
            
            if (currentLevel === 1) {
                items = [
                    {es: 'Uno', en: '1'}, {es: 'Dos', en: '2'},
                    {es: 'Tres', en: '3'}, {es: 'Cinco', en: '5'}, {es: 'Diez', en: '10'}
                ];
            } else if (currentLevel === 2) {
                items = [
                    {es: 'Veinte', en: '20'}, {es: 'Treinta', en: '30'},
                    {es: 'Cuarenta', en: '40'}, {es: 'Cincuenta', en: '50'}, {es: 'Cien', en: '100'}
                ];
            } else if (currentLevel === 3) {
                items = [
                    {es: 'Ciento...', en: '100+'}, {es: 'Doscientos', en: '200'},
                    {es: 'Quinientos', en: '500'}, {es: 'Novecientos', en: '900'}, {es: 'Mil', en: '1000'}
                ];
            } else {
                items = [
                    {es: 'Mil', en: '1000'}, {es: 'Dos mil', en: '2000'},
                    {es: 'Mil novecientos', en: '1900'}, {es: 'Mil quinientos', en: '1500'}
                ];
            }

            items.forEach(item => {
                list.innerHTML += `<li class="vocab-item"><span class="vocab-word">${item.es}</span><span class="vocab-trans">${item.en}</span></li>`;
            });
        }

        function generateOptions(target) {
            const options = new Set([target]);
            let maxVal = 10;
            let minVal = 1;
            if (currentLevel === 2) { minVal = 11; maxVal = 100; }
            else if (currentLevel === 3) { minVal = 101; maxVal = 1000; }
            else if (currentLevel === 4) { minVal = 1001; maxVal = 3000; }

            const addIfValid = (val) => {
                if (val >= minVal && val <= maxVal && val !== target) {
                    options.add(val);
                }
            };

            // Try swapping digits for 2 digit numbers
            if (target >= 11 && target < 100 && target % 11 !== 0) {
                const swapped = parseInt(target.toString().split('').reverse().join(''));
                addIfValid(swapped);
            }

            // Offsets
            const offsets = [-1, 1, -10, 10, -100, 100, -1000, 1000];
            offsets.sort(() => Math.random() - 0.5);
            for (let offset of offsets) {
                addIfValid(target + offset);
                if (options.size >= 4) break;
            }

            // Fill with random
            while (options.size < 4) {
                const rand = Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
                options.add(rand);
            }

            return Array.from(options).sort(() => Math.random() - 0.5);
        }

        function generateTask() {
            locked = false;
            
            if (currentLevel === 1) {
                targetNumber = Math.floor(Math.random() * 10) + 1; // 1-10
            } else if (currentLevel === 2) {
                targetNumber = Math.floor(Math.random() * 90) + 11; // 11-100
            } else if (currentLevel === 3) {
                targetNumber = Math.floor(Math.random() * 900) + 101; // 101-1000
            } else if (currentLevel === 4) {
                if (Math.random() > 0.3) {
                    targetNumber = Math.floor(Math.random() * (2025 - 1500 + 1)) + 1500;
                } else {
                    targetNumber = Math.floor(Math.random() * 2000) + 1001; // 1001-3000
                }
            }
            
            const word = numberToSpanish(targetNumber);
            document.getElementById('instruction').innerHTML = `<strong>${word}</strong>`;
            
            const options = generateOptions(targetNumber);
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => selectOption(opt, btn);
                container.appendChild(btn);
            });

            setTimeout(() => speak(word), 300);
        }

        function selectOption(value, buttonEl) {
            if (locked) return;
            locked = true;
            
            const container = document.getElementById('options-container');
            const buttons = container.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);
            
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('show');
            void feedback.offsetWidth;
            
            if (value === targetNumber) {
                buttonEl.classList.add('correct');
                feedback.textContent = '¡Correcto!';
                feedback.style.color = '#10b981';
                feedback.classList.add('show');
                
                const successPhrases = ['¡Muy bien!', '¡Excelente!', '¡Genial!', '¡Así es!', '¡Correcto!'];
                const phrase = successPhrases[Math.floor(Math.random() * successPhrases.length)];
                speak(phrase);
                
                score += (currentLevel * 10) + (streak * 2);
                streak++;
            } else {
                buttonEl.classList.add('incorrect');
                buttons.forEach(btn => {
                    if (parseInt(btn.textContent) === targetNumber) {
                        btn.classList.add('correct');
                    }
                });
                
                feedback.textContent = `¡Incorrecto! Era ${targetNumber}`;
                feedback.style.color = '#ef4444';
                feedback.classList.add('show');
                
                speak(`Incorrecto. Era el ${targetNumber}`);
                
                streak = 0;
            }
            
            document.getElementById('score-val').textContent = score;
            document.getElementById('streak-val').textContent = `${streak} 🔥`;
            
            setTimeout(() => {
                round++;
                document.getElementById('round-val').textContent = round;
                generateTask();
            }, 2000);
        }

        // Init
        updateVocabulary();
        generateTask();
    </script>
</body>
</html>
